<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CollegeFolder — Plan your semester</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Fraunces:opsz,wght@9..144,500;9..144,600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css" />
</head>
<body>
<a class="skip-link" href="#main">Skip to main content</a>

<!-- Boot splash shown until app.js renders something -->
<div id="boot">
  <div class="boot-spinner" aria-hidden="true"></div>
  <p>Loading…</p>
</div>

<!-- App mounts everything inside these roots -->
<div id="auth-root"  class="hidden" aria-live="polite"></div>
<div id="app-root"   class="hidden" aria-live="polite"></div>
<div id="drawer-root"></div>
<div id="modal-root"></div>
<div id="toast-root" aria-live="polite"></div>

<script src="app.js"></script>
</body>
</html>
