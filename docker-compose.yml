services:
  # ---- PostgreSQL database ----
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: collegefolder
      POSTGRES_PASSWORD: localdevpassword
      POSTGRES_DB: collegefolder
    volumes:
      # Persist database data outside the container so it survives restarts
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      # Backend waits until this reports healthy before starting
      test: ["CMD-SHELL", "pg_isready -U collegefolder"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---- FastAPI backend ----
  backend:
    build: ./backend          # Build the image from backend/Dockerfile
    restart: always
    ports:
      - "8000:8000"           # host:container — reach it at localhost:8000
    environment:
      # "db" is the service name above; inside the compose network it
      # resolves to the database container's address.
      DATABASE_URL: postgresql://collegefolder:localdevpassword@db:5432/collegefolder
      SECRET_KEY: ${SECRET_KEY}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata: